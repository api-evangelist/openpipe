aid: openpipe
url: https://raw.githubusercontent.com/api-evangelist/openpipe/refs/heads/main/apis.yml
name: OpenPipe
kind: company
description: OpenPipe is a fine-tuning and inference platform for distilling expensive frontier-LLM workloads into smaller,
  cheaper specialized models. Captures production traces (OpenAI and Anthropic), fine-tunes, evaluates with judges, caches
  results, and serves the result via OpenAI-compatible API. Also supports proxying to external models.
